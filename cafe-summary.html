<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFE SUMMARY</title>

    <meta name="description" content="カフェ写真集">

    <!--リセットCSS-->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">

    <!--css-->

<body>
    <section class="container">

        <div class="item shibuya tiramisu">
            <img src="cafe-summary-img/white-grass-1.webp" alt="ホワイトグラスコーヒーのティラミス">
            <p class="shop">WHITE GLASS COFFEE</p>
            <p class="tag">＃渋谷　＃ティラミス</p>

        <div class="item shibuya french-toast">

        <div class="item shibuya drink">

        <div class="item shinjuku basque-cheesecake">
