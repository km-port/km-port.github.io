<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <meta name="description" content="ポートフォリオサイト">
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/png" href="img/icon.png">

    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Zen+Antique&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="top-img margin-other">
            <div class="title margin-group">
                <div class="logo"><h1><img src="logo.svg" alt="K.m"></h1></div>
                <div class="top-text"><a class="font-en" href="#portfolio">Portfolio ↓</a></div>
            </div>
        </div>
    </header>

    <main>
        <div id="portfolio" class="font-en margin-group"><h2>Portfolio</h2></div>
        
        <nav class="margin-other font-en">
            <ul>
                <li><a class="menu" href="#web">Web</a></li>
                <li><a class="menu" href="#banner">Banner</a></li>
            </ul>
        </nav>

        <section class="web-fream">
            <h2 id="web" class="font-en">Web</h2>
            <div class="web-list margin-other">

                
                <div class="web-item margin-group">
                    <img class="portfolio-img" src="img/suit-site.png" alt="スーツショップ販売サイト">
                    <div class="portfolio-title">
                        <h3>スーツ<br>ショップサイト</h3>
                    </div>
                    <div class="portfolio-text">
                        <p>架空のスーツショップ「ALTIR」の フレッシャーズ 特設サイト</p>
                    </div>
                    <div>
                        <a  class="portfolio-btn" href="https://km-port.github.io/suit-sample.html">サイトはこちら</a>
                    </div>
                </div>

                <div class="web-item margin-group">
                    <img class="portfolio-img" src="img/freshers-site.png" alt="フレッシャーズ特設サイト">
                    <div class="portfolio-title">
                        <h3>フレッシャーズ<br>特設サイト</h3>
                    </div>
                    <div class="portfolio-text">
                        <p>架空のスーツショップ「ALTIR」のフレッシャーズ特設サイト</p>
                    </div>
                    <div>
                        <a  class="portfolio-btn" href="https://km-port.github.io/freshers-sample.html">サイトはこちら</a>
                    </div>
                </div>
                <!---->

            </div>
        </section>
        

        
        <section class="banner-fream">
            <h2 id="banner" class="font-en">Banner</h2>
            <div class="baner-list margin-other">
                <img class="baner-item-inst margin-group" src="img/pizza.png" alt="キャリアを語ろう会">
                <img class="baner-item-inst margin-group" src="img/cafe-yuru.png" alt="自習作業会">
                <!---->
            </div>
        </section>
    </main>

    <footer>
        <h1><img class="logo" src="logo-yellow.svg" alt="K.M"></h1>
    </footer>
</body>
</html>
